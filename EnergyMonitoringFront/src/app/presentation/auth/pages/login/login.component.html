<div class="min-h-screen flex items-center justify-center bg-background relative overflow-hidden">

  <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-primary/5 rounded-full blur-3xl"></div>

  <div class="w-full max-w-md mx-4">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
        ⚡
      </div>
      <h1 class="text-2xl font-bold text-foreground">EnergyMonitor</h1>
      <p class="text-muted-foreground mt-1">Monitoreo inteligente de energía</p>
    </div>

    <div class="glass-card rounded-2xl p-8 border border-border">
      <h2 class="text-lg font-semibold text-foreground mb-6">Iniciar Sesión</h2>

      <div *ngIf="error"
           class="mb-4 p-3 rounded-lg bg-red-100 border text-red-600 text-sm">
        {{ error }}
      </div>

      <form (ngSubmit)="submit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-muted-foreground mb-1.5">Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="correo@ejemplo.com"
            class="w-full h-11 px-4 rounded-lg bg-muted border border-border">
        </div>

        <div>
          <label class="block text-sm font-medium text-muted-foreground mb-1.5">Contraseña</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            class="w-full h-11 px-4 rounded-lg bg-muted border border-border">
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full h-11 rounded-lg bg-primary text-primary-foreground font-semibold">

          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>

      <p class="text-center text-sm text-muted-foreground mt-6">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-primary hover:underline font-medium">
          Regístrate
        </a>
      </p>
    </div>

  </div>
</div>
