@if (isModalOpen) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-background/80 backdrop-blur-sm animate-in fade-in duration-200">
        <div class="glass-card w-full max-w-lg rounded-xl border border-border p-6 shadow-lg animate-in zoom-in-95 duration-200 text-left bg-background">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-foreground">{{ isEditMode ? 'Actualizar' : 'Agregar' }} Tipo de Dispositivo</h2>
                <button type="button" (click)="closeModal.emit()"
                    class="p-2 rounded-lg hover:bg-muted transition-colors text-muted-foreground hover:text-foreground">
                    <lucide-icon [name]="X" class="h-5 w-5"></lucide-icon>
                </button>
            </div>
            
            <form [formGroup]="deviceTypeForm" (ngSubmit)="onSubmit()" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-foreground mb-1">Nombre</label>
                    <input type="text" formControlName="name" placeholder="Ej. Inversor"
                        class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    @if(deviceTypeForm.get('name')?.invalid && deviceTypeForm.get('name')?.touched) {
                        <p class="text-xs text-destructive mt-1">El nombre es requerido.</p>
                    }
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Voltaje Mínimo</label>
                        <input type="number" step="0.01" formControlName="minVoltage" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Voltaje Máximo</label>
                        <input type="number" step="0.01" formControlName="maxVoltage" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Corriente Mínima</label>
                        <input type="number" step="0.01" formControlName="minCurrent" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Corriente Máxima</label>
                        <input type="number" step="0.01" formControlName="maxCurrent" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Potencia Mín. (W)</label>
                        <input type="number" step="0.01" formControlName="minPowerWatts" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-1">Potencia Máx. (W)</label>
                        <input type="number" step="0.01" formControlName="maxPowerWatts" placeholder="0.00"
                            class="w-full h-10 px-3 rounded-lg bg-background border border-input text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-muted-foreground flex items-center">
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" (click)="closeModal.emit()"
                        class="h-10 px-4 rounded-lg bg-muted text-foreground font-semibold text-sm hover:opacity-90 transition-opacity">
                        Cancelar
                    </button>

                    <button type="submit" [disabled]="deviceTypeForm.invalid"
                        class="h-10 px-4 rounded-lg bg-primary text-primary-foreground font-semibold text-sm hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
                        {{ isEditMode ? 'Actualizar' : 'Aceptar' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
}
